name: no-depot-guard

# Birch Hill builds container images on GitHub-hosted runners, not Depot.
# Upstream (paradigmxyz/centaur) uses Depot; an upstream sync once reintroduced
# that dependency silently and broke image builds for days. This guard fails any
# PR — including an upstream sync — that brings Depot runners or actions back into
# our workflows, so it can never slip in unnoticed again. See publish-images.yml.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  no-depot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Fail if Depot is referenced in any workflow
        run: |
          # Birch Hill runs all CI on GitHub-hosted runners. Upstream uses Depot;
          # this fails any PR (incl. upstream syncs) that reintroduces Depot
          # runners or actions into any workflow.
          if grep -rniE 'depot-ubuntu|depot/(setup-action|build-push-action|bake-action)' \
              .github/workflows/ --exclude=no-depot-guard.yml; then
            echo "::error::Depot reference found in .github/workflows/. Birch Hill builds on GitHub-hosted runners — keep the de-Depot patches when syncing upstream (see publish-images.yml)."
            exit 1
          fi
          echo "OK — no Depot runners or actions in any workflow."
